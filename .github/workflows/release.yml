name: Create Release

on:
  push:
    branches:
      - main

# release 作成に必要な contents: write は job 側で付与する (最小権限)。
permissions:
  contents: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: set release tag
        id: set_release_tag
        run: |
          # extract a line from pyproject.toml
          version_line=$(grep -m 1 '^version = ' pyproject.toml)

          # extract "x.y.z" from "version = x.y.z" from the line
          version=$(echo "$version_line" | sed -E 's/version = "([0-9]+\.[0-9]+\.[0-9]+)"/\1/')
          echo "Extracted version: v${version}"

          # write version to environment variable
          echo "RELEASE_TAG=v${version}" >> "$GITHUB_ENV"

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.6.16"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.10"

      - name: Create venv
        run: uv venv

      - name: Sync project
        run: uv sync --locked --all-extras

      - name: Build
        run: uv build

      # version が変わらない main への push でも同名タグで作成を試みると失敗するため、
      # 既存リリースの有無を確認してリリース作成を冪等にする (Issue #37)。
      - name: check existing release
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists. Skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # release 作成は外部 action でなく runner 同梱の gh で行う (zizmor の指摘。
      # 外部依存が減り supply-chain 面でも安全)。
      - name: create release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'Release: %s :tada:\n\nCommit: %s\n' "$RELEASE_TAG" "$GITHUB_SHA" > "$RUNNER_TEMP/notes.md"
          gh release create "$RELEASE_TAG" ./dist/* \
            --target "$GITHUB_SHA" \
            --title "Release $RELEASE_TAG" \
            --notes-file "$RUNNER_TEMP/notes.md"
